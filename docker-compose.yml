services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-multistrat}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - multistrat

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - multistrat

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    restart: unless-stopped
    networks:
      - multistrat
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped
    networks:
      - multistrat
    depends_on:
      redis:
        condition: service_healthy

  oms:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-multistrat}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-multistrat}
      # Backfills and scripts using ``MarketDataSettings`` prefer MARKET_DATA_DATABASE_URL; .env often
      # uses localhost for host dev — override so ``docker compose run oms`` matches ``market_data``.
      MARKET_DATA_DATABASE_URL: postgresql://${POSTGRES_USER:-multistrat}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-multistrat}
    restart: unless-stopped
    networks:
      - multistrat
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  pms:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-multistrat}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-multistrat}
    command: ["python", "-m", "pms.main"]
    restart: unless-stopped
    networks:
      - multistrat
    depends_on:
      postgres:
        condition: service_healthy

  risk:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      # Optional: comma-separated rule_ids (empty = pass-through)
      # RISK_RULE_PIPELINE: ORDER_01_MIN_QTY,ORDER_02_MAX_QTY
    command: ["python", "-m", "risk.main"]
    restart: unless-stopped
    networks:
      - multistrat
    depends_on:
      redis:
        condition: service_healthy

  market_data:
    build: .
    env_file: .env
    environment:
      # Both: ``MarketDataSettings`` prefers MARKET_DATA_DATABASE_URL over DATABASE_URL; .env often
      # points at localhost for host dev — override so the container uses the compose Postgres service.
      DATABASE_URL: postgresql://${POSTGRES_USER:-multistrat}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-multistrat}
      MARKET_DATA_DATABASE_URL: postgresql://${POSTGRES_USER:-multistrat}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-multistrat}
      # Optional: MARKET_DATA_BINANCE_BASE_URL
    command: ["python", "-m", "market_data.main"]
    restart: unless-stopped
    networks:
      - multistrat
    depends_on:
      postgres:
        condition: service_healthy

  strategies_runner:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-multistrat}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-multistrat}
      STRATEGIES_PIPELINE_DATABASE_URL: postgresql://${POSTGRES_USER:-multistrat}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-multistrat}
    command: ["python", "-m", "strategies.runner"]
    restart: unless-stopped
    networks:
      - multistrat
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build: .
    env_file: .env
    environment:
      # Override host-local .env so the container uses compose Postgres / Redis.
      DATABASE_URL: postgresql://${POSTGRES_USER:-multistrat}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-multistrat}
      REDIS_URL: redis://redis:6379
      # Binance recon jobs read BINANCE_* from .env (keys, BINANCE_BASE_URL, BINANCE_TESTNET)
    command: ["python", "-m", "scheduler"]
    volumes:
      # Host folder (gitignored) so CSV reports are editable outside the container.
      - ./scheduler/reports_out:/app/scheduler/reports_out
    restart: unless-stopped
    networks:
      - multistrat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redisinsight_data:

networks:
  multistrat:
    driver: bridge
